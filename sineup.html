<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome to Photography</title>
<link rel="icon" type="image/png" href="images/favicon.png">

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<link rel="stylesheet" href="sineup.css">
</head>
<body>

<div class="container">

    <div class="signup-box">

        <h2>Create Account</h2>
        <p>Start your photography journey with us</p>

        <form>

            <div class="input-box">
                <i class="fa fa-user"></i>
                <input type="text" required>
                <label>Full Name</label>
            </div>

            <div class="input-box">
                <i class="fa fa-envelope"></i>
                <input type="email" required>
                <label>Email Address</label>
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" required>
                <label>Password</label>
            </div>

            <div class="input-box">
                <i class="fa fa-lock"></i>
                <input type="password" required>
                <label>Confirm Password</label>
            </div>

            <div class="terms">
                <label>
                    <input type="checkbox" required> I agree to Terms & Conditions
                </label>
            </div>

            <button type="submit">Create Account</button>

            <p class="login-link">
                Already have an account? <a href="login.html">Login</a>
                <p>© 2026 Noting | All Rights Reserved</p>
            </p>

        </form>

    </div>

</div>

</body>
</html>
